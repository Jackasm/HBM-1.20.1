name: Push to Public Repository

on:
  push:
    branches: [ "master" ]

jobs:
  bump-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get last tag
        id: last_tag
        run: |
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          echo "last_tag=$LAST_TAG" >> $GITHUB_OUTPUT

      - name: Compute new version
        id: new_version
        run: |
          LAST_TAG="${{ steps.last_tag.outputs.last_tag }}"
          VERSION=${LAST_TAG#v}
          IFS='.' read -r major minor patch <<< "$VERSION"
          NEW_PATCH=$((patch + 1))
          NEW_VERSION="$major.$minor.$NEW_PATCH"
          echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT

      - name: Update version in gradle.properties
        run: |
          sed -i "s/mod_version=.*/mod_version=${{ steps.new_version.outputs.new_version }}/" gradle.properties

      - name: Commit version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add gradle.properties
          git commit -m "chore: bump version to ${{ steps.new_version.outputs.new_version }}" || echo "No changes"
          git push origin master

      - name: Push to public repository
        run: |
          git clone --depth 1 https://x-access-token:${{ secrets.RELEASE_TOKEN }}@github.com/Jackasm/HBM-1.20.1.git /tmp/public-repo
          rsync -av --delete --exclude '.git' ./ /tmp/public-repo/
          cd /tmp/public-repo
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --staged --quiet || git commit -m "Sync from private repo"
          git push origin master
